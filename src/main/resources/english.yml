language-settings:
  display-name: "English"
  default: true

message:
  command:
    # general messages
    general:
      error:
        no-permission: "<red>You are not allowed to do this!"
        exception: "<red>Failed to execute <command_label> command. Please contact an admin to solve this issue."
        player-not-found: "<red>Target player is offline."
    
    # language command messages
    language:
      usage: "<red>Usage: /language <language><newLine><red>Available languages: <gold><languages>"
      usage-separator-format: "<red>, <gold>"
      updated: "<green>Your language has been updated successfully."
      error:
        already-selected: "<red>You've already selected this language."
        not-found: "<red>Language by this id does not exist."
    
    # team command messages
    team:
      created: "<yellow>Team <green><team_name></green> created successfully."
      disband:
        confirmation: "<red>To confirm, use <gold>/team disband <teamName></gold> to disband your team."
      option:
        usage: "<red>Usage: /team options <option> <value><newLine><red>Available options: <gold><options>"
        usage-separator-format: "<red>, <gold>"

      error:
        exists: "<red>Team by this name already exists. Use another name."
        not-exists: "<red>Team by this name doesn't exist!"
        long-name: "<red>Team name is too long!"
        long-tag-name: "<red>Team tag is too long!"
        invalid-name: "<red>Team name can only have characters, numbers and underscores."
        invalid-tag-name: "<red>Team tag can only have characters, numbers and underscores."
        invalid-tag-color: "<red>Team tag color is invalid."
        invalid-color: "<red>Team tag color is invalid."
        home-unsafe: "<red>Failed to set the team home. Location is unsafe!"
        home-not-exists: "<red>Team home has not been set yet!"
        home-on-cooldown: "<red>Wait <gold>30s</gold> between uses!"
        option-unknown-error: "<red>An unknown error occurred. Please try again later."
        on-capacity: "<red>Team has reached the maximum amount of members."
        player:
          has-team: "<red>You are already in a team!"
          lacking-team: "<red>You don't have a team!"
          not-leader: "<red>Only team leader can do this!"
          on-creation-cooldown: "<red>You can only create teams every 60 seconds."
        target:
          is-self: "<red>You cannot do this to yourself!"
          has-team: "<red>Target is already in another team!"
          lacking-team: "<red>Target is not in the team!"
        leader:
          cannot-leave: "<red>Team leader cannot leave the team. Use <gold>/team disband</gold> or <gold>/team transfer</gold> to proceed."
        invitation:
          already-invited: "<red>You've already invited this player. Wait for them to accept the team invitation."
          lacking: "<red>You don't have an invitation from this team."
        disband:
          invalid-team-name: "<red>Failed to disband the team. Invalid team name."

broadcast:
  team:
    general:
      prefix: "<green>Team <white><bold>></bold> "
      member-join: "<newline><team_broadcast_prefix><aqua><member_name><yellow> has joined the team.<newline>"
      member-leave: "<newline><team_broadcast_prefix><aqua><member_name><yellow> has left the team.<newline>"
    disband: "<newline><team_broadcast_prefix><yellow>Team leader has disbanded the team.<newline>"
    kick: "<newline><team_broadcast_prefix><yellow>Team leader has kicked <aqua><member_name></aqua> from the team.<newline>"
    transfer: "<newline><team_broadcast_prefix><green><old_leader><yellow> has transferred the party leader to <aqua><new_leader></aqua>.<newline>"
    invitation:
      members: "<newline><team_broadcast_prefix><aqua><team_leader_name> <yellow>has invited <green><target_name></green> to join the team.<newline>"
      target: "<newline><yellow><aqua><team_leader_name></aqua> has invited you to join their team!<newline>You have <red>60</red> seconds to accept. <gold><hover:show_text:'<gold>Click to accept'><click:run_command:'/team accept <team_id>'><gold>Click here to join!</click><newline>"
      expired: "<red>Your team request with <yellow><target_name></yellow> has expired."
      expired-target: "<red>Your invitation from <yellow><team_leader_name></yellow> has expired."
    option:
      tag-name-changed: "<newline><team_broadcast_prefix><yellow>Team leader has changed the team tag name to <team_tag_name><yellow>!<newline>"
      tag-color-changed: "<newline><team_broadcast_prefix><yellow>Team leader has changed the team tag color to <team_tag_color_name><yellow>!<newline>"
      friendly-fire-toggled: "<newline><team_broadcast_prefix><yellow>Team leader has <team_friendly_fire_status><yellow> friendly fire for the team.<newline>"
      chat-toggled: "<newline><team_broadcast_prefix><aqua><yellow>Team leader has <team_chat_muted_status><yellow> the team chat.<newline>"
      home-updated: "<newline><team_broadcast_prefix><aqua><yellow>Team leader has <green>updated</green> the team home.<newline>"
      enabled: "<green>enabled"
      disabled: "<red>disabled"